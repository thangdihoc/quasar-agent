<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quasar — AI Agent</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-input: #16162a;
            --accent: #7c3aed;
            --accent-hover: #8b5cf6;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --border: #2d2d44;
            --success: #10b981;
            --error: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: white;
        }

        .title { font-size: 18px; font-weight: 600; }
        .subtitle { font-size: 12px; color: var(--text-dim); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-badge {
            padding: 4px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-hover);
            cursor: pointer;
            transition: all 0.2s;
        }
        .model-badge:hover { border-color: var(--accent); }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.assistant code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .message.assistant pre {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 6px; height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Welcome */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
        }

        .welcome-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--accent), #a855f7, #ec4899);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 700; color: white;
            box-shadow: 0 0 40px var(--accent-glow);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .welcome h2 { font-size: 24px; font-weight: 600; }
        .welcome p { color: var(--text-secondary); font-size: 14px; max-width: 400px; }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .send-btn {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-glow); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .new-btn {
            width: 44px; height: 44px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }
        .new-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">Q</div>
            <div>
                <div class="title">Quasar</div>
                <div class="subtitle">Personal AI Agent</div>
            </div>
        </div>
        <div class="header-right">
            <div class="model-badge" id="modelBadge" title="Click to change model">gpt-4o</div>
            <div class="status-dot"></div>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="welcome-logo">Q</div>
            <h2>Xin chào! 👋</h2>
            <p>Tôi là Quasar — trợ lý AI cá nhân. Tôi có thể chạy lệnh, đọc/ghi file, tìm kiếm web, và nhiều hơn nữa.</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <button class="new-btn" id="newBtn" title="New conversation">🔄</button>
            <textarea id="input" placeholder="Gửi tin nhắn..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const newBtn = document.getElementById('newBtn');
        const welcome = document.getElementById('welcome');
        const modelBadge = document.getElementById('modelBadge');

        let sessionId = null;
        let isProcessing = false;

        // Auto-resize textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        });

        // Enter to send, Shift+Enter for newline
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        newBtn.addEventListener('click', () => {
            sessionId = null;
            chatArea.innerHTML = '';
            chatArea.appendChild(welcome);
            welcome.style.display = 'flex';
        });

        // Load current model
        fetch('/api/model').then(r => r.json()).then(d => {
            modelBadge.textContent = d.model;
        }).catch(() => {});

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            input.value = '';
            input.style.height = 'auto';

            // Hide welcome
            if (welcome.parentNode === chatArea) {
                welcome.style.display = 'none';
            }

            // Add user message
            addMessage(text, 'user');

            // Show typing
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, message: text }),
                });

                const data = await res.json();
                sessionId = data.sessionId;

                // Remove typing
                typing.remove();

                // Add response
                addMessage(data.response || data.error || 'No response', 'assistant');
            } catch (e) {
                typing.remove();
                addMessage('❌ Connection error', 'assistant');
            }

            isProcessing = false;
            sendBtn.disabled = false;
            input.focus();
        }

        function addMessage(text, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = text;
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
