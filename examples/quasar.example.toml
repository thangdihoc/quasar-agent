# Quasar Agent Configuration (Rust Edition)

[gateway]
port = 18789
host = "127.0.0.1"

[agent]
model = "gpt-4o"
thinking_level = "medium"
max_tokens = 4096
# system_prompt = "Custom system prompt..."

[telegram]
token = "YOUR_TELEGRAM_BOT_TOKEN"
allowed_users = [123456789]

[providers.openai]
api_key = "sk-..."
# base_url = "https://api.openai.com/v1"

[providers.anthropic]
api_key = "sk-ant-..."

[providers.google]
api_key = "..."

[providers.openrouter]
api_key = "sk-or-..."
base_url = "https://openrouter.ai/api/v1"

[providers.ollama]
base_url = "http://localhost:11434/v1"

[tools]
allow = [
    "exec",
    "file_read",
    "file_write",
    "file_edit",
    "file_list",
    "web_fetch",
    "web_search",
]
deny = []
exec_requires_approval = true

[memory]
sqlite_path = "./data/memory.db"
lancedb_path = "./data/lancedb"

[[mcp.servers]]
name = "filesystem"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "./"]

[[mcp.servers]]
name = "brave-search"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]

[mcp.servers.env]
BRAVE_API_KEY = "your-brave-api-key"

[computer_use]
enabled = false
python_port = 18790

[web]
api_key = "optional-web-api-key"
