<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="nova.css">
</head>
<body data-state="idle">
  <div id="nova-container">
    <!-- Glow ring behind Nova -->
    <div id="nova-glow"></div>
    
    <!-- Main body -->
    <div id="nova-body">
      <!-- Face -->
      <div id="nova-face">
        <!-- Eyes -->
        <div class="nova-eye left">
          <div class="nova-pupil"></div>
        </div>
        <div class="nova-eye right">
          <div class="nova-pupil"></div>
        </div>
        <!-- Mouth -->
        <div id="nova-mouth"></div>
      </div>
      
      <!-- Status indicator ring -->
      <div id="nova-ring"></div>
    </div>
    
    <!-- Floating particles -->
    <div id="nova-particles">
      <span class="particle p1"></span>
      <span class="particle p2"></span>
      <span class="particle p3"></span>
      <span class="particle p4"></span>
      <span class="particle p5"></span>
      <span class="particle p6"></span>
    </div>
    
    <!-- State label -->
    <div id="nova-label">Nova</div>
  </div>

  <!-- Context menu -->
  <div id="context-menu" class="hidden">
    <button id="menu-toggle-click">🖱️ Xuyên chuột</button>
    <button id="menu-minimize">📌 Ẩn Nova</button>
    <hr>
    <button id="menu-exit">❌ Thoát</button>
  </div>

  <script src="nova.js"></script>
</body>
</html>
